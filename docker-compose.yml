services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DB__HOST: database
      DB__NAME: pushup_api
      DB__USER: root
      DB__PASSWORD: root
    depends_on:
      database:
        condition: service_healthy

  database:
    image: postgres:alpine
    environment:
      POSTGRES_DB: pushup_api
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - database-storage:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d pushup_api"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  database-storage:

